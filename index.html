<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Todo Card</title>
  </head>
  <body>
    <article class="card" data-testid="test-todo-card">
      <div class="top-row">
        <label>
          <input
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            id="todoCheck"
          />
        </label>
        <h2 data-testid="test-todo-title" id="title">Design Landing Page</h2>
        <span class="priority high" data-testid="test-todo-priority">High</span>
      </div>
      <p data-testid="test-todo-description">Build a Testable Todo Item Card</p>

      <div class="time">
        <time data-testid="test-todo-remaining-time" id="timeRemaining">
          Due in 1 day
        </time>
        <time datetime="2026-04-17" data-testid="test-todo-due-date"></time>
          • April 17, 2026</time
        >
      </div>
      <div class="tags" data-testid="test-todo-tags" role="list">
        <span role="listitem" data-testid="test-todo-tag">Item Card</span>
        <span role="listitem" data-testid="test-todo-tag">Urgent</span>
      </div>
      <div class="status">
        Status:
        <span data-testid="test-todo-status" id="statusText">In Progress</span>
      </div>
      <div class="actions">
        <button data-testid="test-todo-edit-button" onclick="editTask">
          Edit
        </button>
        <button data-testid="test-todo-delete-button" onclick="deleteTask">
          Delete
        </button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
