<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Todo Card</title>
  </head>

  <body>
    <article class="card" data-testid="test-todo-card">
      <!-- ================= VIEW MODE ================= -->
      <div id="viewMode">
        <div class="top-row">
          <label>
            <input
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              id="todoCheck"
            />
          </label>

          <h2 data-testid="test-todo-title" id="title">Design Landing Page</h2>

          <div data-testid="test-todo-priority-indicator">
            <span class="priority high" data-testid="test-todo-priority">
              High
            </span>
          </div>
        </div>

        <div id="descBox" data-testid="test-todo-collapsible-section">
          <p data-testid="test-todo-description">
            Build a Testable Todo Item Card
          </p>
        </div>

        <button data-testid="test-todo-expand-toggle" id="expandBtn">
          Show More
        </button>

        <div class="time">
          <time data-testid="test-todo-time-remaining" id="timeRemaining">
            Due in 1 day
          </time>

          <time
            datetime="2026-04-17"
            data-testid="test-todo-due-date"
            id="dueDate"
          >
            • April 17, 2026
          </time>
        </div>

        <select data-testid="test-todo-status-control" id="statusControl">
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Done">Done</option>
        </select>

        <div class="status">
          Status:
          <span data-testid="test-todo-status" id="statusText">
            In Progress
          </span>
        </div>

        <div class="actions">
          <button data-testid="test-todo-edit-button" id="editBtn">Edit</button>

          <button data-testid="test-todo-delete-button" id="deleteBtn">
            Delete
          </button>
        </div>
      </div>

      <!-- ================= EDIT MODE ================= -->
      <div
        data-testid="test-todo-edit-form"
        id="editForm"
        style="display: none"
      >
        <label for="editTitle">Title</label>
        <input
          type="text"
          data-testid="test-todo-edit-title-input"
          id="editTitle"
        />

        <label for="editDesc">Description</label>
        <textarea
          data-testid="test-todo-edit-description-input"
          id="editDesc"
        ></textarea>

        <label for="editPriority">Priority</label>
        <select data-testid="test-todo-priority-select" id="editPriority">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>

        <label for="editDueDate">Due Date</label>
        <input
          type="date"
          data-testid="test-todo-edit-due-date-input"
          id="editDueDate"
        />

        <button data-testid="test-todo-save-button" id="saveBtn">Save</button>

        <button data-testid="test-todo-cancel-button" id="cancelBtn">
          Cancel
        </button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
